[defaults]
slack_channel = "C09F1T4C6F3"
repos_base_dir = "/home/ec2-user/repos"
claude_max_plan_turns = 10
claude_max_execute_turns = 20
# claude_timeout_secs = 600
# claude_max_output_bytes = 100000
# claude_exec_mode = "normal"
tasks_cache_file = "/home/ec2-user/.config/wez-sidebar/tasks-cache.json"
# claude_max_concurrent = 2
# claude_allowed_env = ["PATH", "HOME", "USER", "SHELL", "LANG", "LC_ALL"]

# [defaults.module_policy.executor]
# exec_mode = "normal"
# timeout_secs = 900
#
# [defaults.module_policy.analyzer]
# timeout_secs = 300

[[repo]]
key = "slack-task-runner"
github = "your-org/slack-task-runner"
default_branch = "main"

[repo.match]
project_gid = "1209044193035773"

# ── Ops モード（Slack チャンネル監視 → スキル自動実行） ──

[[repo]]
key = "hikken_schedule"
github = "amu-tazawa-scripts/hikken_schedule"
ops_channel = "必見自動化"
ops_skills = [".claude/commands/ops.md"]

[[repo]]
key = "send_survey_mail"
github = "amu-tazawa-scripts/send_survey_mail"
ops_channel = "amz_結果アンケート自動化"
ops_skills = [".claude/skills/add-subcategory/SKILL.md"]

[[repo]]
key = "favorite_pop"
github = "amu-tazawa-scripts/favorite_pop"
ops_channel = "amz_企画チーム_自動化支援"
ops_skills = [".claude/skills/add-interview/SKILL.md"]

# ── スケジュールジョブ ──────────────────────
# cron 式: "sec min hour day_of_month month day_of_week year"

[[schedule]]
key = "morning_briefing"
cron = "0 0 9 * * Mon-Fri *"    # 平日 9:00
job_type = "morning_briefing"
prompt = ""  # デフォルトプロンプト使用（構造化済み）

[[schedule]]
key = "evening_summary"
cron = "0 0 18 * * Mon-Fri *"   # 平日 18:00
job_type = "evening_summary"
prompt = ""  # デフォルトプロンプト使用（構造化済み）

[[schedule]]
key = "meeting_reminder"
cron = "0 */5 8-20 * * Mon-Fri *"   # 平日 8-20時、5分間隔
job_type = "meeting_reminder"
prompt = ""

[[schedule]]
key = "stagnation_check"
cron = "0 0 14 * * Mon-Fri *"       # 平日 14:00
job_type = "stagnation_check"
prompt = ""

[[schedule]]
key = "weekly_pm_review"
cron = "0 0 17 * * Fri *"           # 毎週金曜 17:00
job_type = "weekly_pm_review"
prompt = ""
